name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Submit URLs to IndexNow
        run: |
          sleep 30
          URLS=$(curl -s https://healthcalculator.app/sitemap.xml | grep -oP '(?<=<loc>)[^<]+')
          curl -s -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json" \
            -d "{
              \"host\": \"healthcalculator.app\",
              \"key\": \"d8a822fc1172432da43023ea81509e66\",
              \"keyLocation\": \"https://healthcalculator.app/d8a822fc1172432da43023ea81509e66.txt\",
              \"urlList\": [$(echo "$URLS" | sed 's/.*/"&"/' | paste -sd,)]
            }"
        continue-on-error: true
